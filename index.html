document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Unicredit · Customer search<\u002Ftitle>\n<style>/* cyrillic-ext */\n\n/* cyrillic */\n\n/* greek-ext */\n\n/* greek */\n\n/* math */\n\n/* symbols */\n\n/* vietnamese */\n\n/* latin-ext */\n\n/* latin */\n\n/* cyrillic-ext */\n\n/* cyrillic */\n\n/* greek-ext */\n\n/* greek */\n\n/* math */\n\n/* symbols */\n\n/* vietnamese */\n\n/* latin-ext */\n\n/* latin */\n\n/* cyrillic-ext */\n\n/* cyrillic */\n\n/* greek-ext */\n\n/* greek */\n\n/* math */\n\n/* symbols */\n\n/* vietnamese */\n\n/* latin-ext */\n\n/* latin */\n\n<\u002Fstyle>\n<style>\n/* ============================================\n   EMMA DESIGN SYSTEM · VARIABLES\n   ============================================ */\n:root {\n  /* PRIMARIOS */\n  --emma-navy:      #171C8F;\n  --emma-green:     #26D07C;\n\n  /* SECUNDARIOS */\n  --emma-red:       #F4364C;\n  --emma-cyan:      #05C3DD;\n  --emma-yellow:    #F6BE00;\n  --emma-purple:    #753BBD;\n\n  /* NEUTRALES */\n  --emma-black:     #1A1B1E;\n  --emma-gray:      #7C878E;\n  --emma-gray-500:  #8A8AA0;\n  --emma-gray-300:  #D1D1E0;\n  --emma-gray-200:  #E8E8F4;\n  --emma-gray-100:  #F5F5F5;\n  --emma-bg-blue:   #F7F8FF;\n  --emma-bg-gray:   #FAFAFA;\n  --emma-white:     #FFFFFF;\n\n  /* SEMÁNTICOS */\n  --color-success:  #4CAF50;\n  --color-error:    #F44336;\n  --color-warning:  #FF9800;\n  --color-info:     #2196F3;\n\n  /* DISABLED (botones) */\n  --btn-primary-disabled-bg: #BEF1D8;\n  --btn-primary-disabled-text: #7477BC;\n\n  /* TIPOGRAFÍA */\n  --font-brand: 'Roboto', sans-serif;\n  --fw-regular: 400;\n  --fw-medium: 500;\n  --fw-bold: 700;\n\n  /* ESPACIADO */\n  --space-1: 4px;   --space-2: 8px;   --space-3: 12px;\n  --space-4: 16px;  --space-5: 20px;  --space-6: 24px;\n  --space-8: 32px;  --space-10: 40px; --space-12: 48px;\n\n  /* RADIOS */\n  --radius-btn:  4px;\n  --radius-sm:   8px;\n  --radius-md:   12px;\n  --radius-lg:   16px;\n  --radius-xl:   24px;\n  --radius-2xl:  32px;\n  --radius-full: 9999px;\n\n  /* SOMBRAS */\n  --shadow-sm:   0 1px 4px rgba(23,28,143,0.08);\n  --shadow-md:   0 4px 16px rgba(23,28,143,0.12);\n  --shadow-lg:   0 8px 32px rgba(23,28,143,0.16);\n  --shadow-card: 0 2px 12px rgba(23,28,143,0.10);\n\n  /* SIDEBAR DIMENSIONS */\n  --sidebar-closed: 120px;\n  --sidebar-open: 240px;\n}\n\n/* ============================================\n   RESET & BASE\n   ============================================ */\n* {\n  box-sizing: border-box;\n  margin: 0;\n  padding: 0;\n}\n\nhtml, body {\n  font-family: var(--font-brand);\n  font-size: 14px;\n  color: var(--emma-black);\n  background: var(--emma-white);\n  line-height: 1.4;\n  -webkit-font-smoothing: antialiased;\n}\n\nbutton {\n  font-family: inherit;\n  cursor: pointer;\n  border: none;\n  background: none;\n}\n\na {\n  color: inherit;\n  text-decoration: none;\n}\n\n/* ============================================\n   APP LAYOUT\n   ============================================ */\n.app {\n  display: flex;\n  min-height: 100vh;\n  background: var(--emma-white);\n}\n\n/* ============================================\n   SIDEBAR\n   ============================================ */\n.sidebar {\n  width: var(--sidebar-closed);\n  background: var(--emma-white);\n  border-right: 1px solid var(--emma-gray-200);\n  display: flex;\n  flex-direction: column;\n  padding: var(--space-6) 0;\n  transition: width 0.2s ease;\n  position: relative;\n}\n\n.sidebar.open { width: var(--sidebar-open); }\n\n.sidebar-header {\n  display: flex;\n  align-items: center;\n  gap: var(--space-3);\n  padding: 0 var(--space-6);\n  margin-bottom: var(--space-10);\n}\n\n.sidebar-toggle {\n  width: 24px;\n  height: 24px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--emma-black);\n  flex-shrink: 0;\n}\n\n.sidebar-logo-closed {\n  width: 40px;\n  height: 40px;\n  flex-shrink: 0;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n\n.sidebar-logo-closed svg { width: 100%; height: 100%; display: block; }\n\n.sidebar-logo-open {\n  display: none;\n  font-weight: var(--fw-bold);\n  font-size: 18px;\n  color: var(--emma-navy);\n  letter-spacing: 0.5px;\n}\n\n.sidebar-logo-open .logo-uni {\n  text-decoration: underline;\n  text-underline-offset: 4px;\n}\n\n.sidebar.open .sidebar-logo-closed { display: none; }\n.sidebar.open .sidebar-logo-open { display: block; }\n\n.sidebar-nav {\n  flex: 1;\n  display: flex;\n  flex-direction: column;\n  gap: var(--space-2);\n  padding: 0 var(--space-4);\n}\n\n.nav-item {\n  display: flex;\n  align-items: center;\n  gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-radius: var(--radius-sm);\n  color: var(--emma-black);\n  font-size: 14px;\n  font-weight: var(--fw-medium);\n  cursor: pointer;\n  transition: background 0.15s ease;\n  white-space: nowrap;\n  overflow: hidden;\n}\n\n.nav-item:hover { background: var(--emma-gray-100); }\n\n.nav-item.active {\n  background: var(--emma-bg-blue);\n  color: var(--emma-navy);\n}\n\n.nav-item-icon {\n  width: 24px;\n  height: 24px;\n  flex-shrink: 0;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n\n.nav-item-label { display: none; }\n.sidebar.open .nav-item-label { display: block; }\n\n.sidebar-footer {\n  padding: 0 var(--space-4);\n  margin-top: auto;\n}\n\n/* ============================================\n   MAIN CONTENT\n   ============================================ */\n.main {\n  flex: 1;\n  display: flex;\n  flex-direction: column;\n  background: var(--emma-white);\n}\n\n/* ============================================\n   TOP BAR\n   ============================================ */\n.topbar {\n  display: flex;\n  align-items: center;\n  justify-content: flex-end;\n  padding: var(--space-5) var(--space-8);\n}\n\n.flag-jamaica {\n  width: 32px;\n  height: 32px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  flex-shrink: 0;\n}\n\n.flag-jamaica svg { width: 100%; height: 100%; display: block; }\n\n/* ============================================\n   CONTENT AREA\n   ============================================ */\n.content {\n  flex: 1;\n  padding: var(--space-4) var(--space-10) var(--space-10);\n  width: 100%;\n}\n\n.content-inner {\n  max-width: 720px;\n  margin: 0 auto;\n  width: 100%;\n}\n\n.page-title {\n  font-size: 32px;\n  font-weight: var(--fw-medium);\n  color: var(--emma-navy);\n  letter-spacing: 0.02em;\n  margin-bottom: var(--space-2);\n  padding: 0 var(--space-2);\n}\n\n.page-subtitle {\n  font-size: 16px;\n  color: var(--emma-gray-500);\n  margin-bottom: var(--space-8);\n  padding: 0 var(--space-2);\n}\n\n/* ============================================\n   SEARCH CARD\n   ============================================ */\n.search-card {\n  background: var(--emma-white);\n  border: 1px solid var(--emma-gray-200);\n  border-radius: var(--radius-md);\n  box-shadow: var(--shadow-card);\n  padding: var(--space-6) var(--space-8) var(--space-8);\n  margin-bottom: var(--space-8);\n}\n\n/* Card top bar: \"+ New customer\" alineado a la derecha */\n.card-topbar {\n  display: flex;\n  align-items: center;\n  justify-content: flex-end;\n  margin-bottom: var(--space-4);\n}\n\n.new-customer-link {\n  display: inline-flex;\n  align-items: center;\n  gap: var(--space-2);\n  color: var(--emma-navy);\n  font-size: 14px;\n  font-weight: var(--fw-bold);\n  letter-spacing: 0.02em;\n  padding: var(--space-2) var(--space-2);\n  cursor: pointer;\n  transition: opacity 0.15s ease;\n}\n\n.new-customer-link:hover { opacity: 0.7; }\n\n.new-customer-link svg {\n  width: 18px;\n  height: 18px;\n}\n\n/* ============================================\n   TABS (Document / Name / COSACS ID)\n   ============================================ */\n.tabs {\n  display: flex;\n  border-bottom: 1px solid var(--emma-gray-200);\n  margin: 0 calc(-1 * var(--space-8)) var(--space-6);\n  padding: 0 var(--space-8);\n}\n\n.tab {\n  flex: 1;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: var(--space-2);\n  padding: var(--space-3) 0 var(--space-4);\n  font-size: 14px;\n  font-weight: var(--fw-medium);\n  color: var(--emma-gray-500);\n  letter-spacing: 0.02em;\n  cursor: pointer;\n  border-bottom: 2px solid transparent;\n  margin-bottom: -1px;\n  transition: color 0.15s ease, border-color 0.15s ease;\n  white-space: nowrap;\n}\n\n.tab svg {\n  width: 18px;\n  height: 18px;\n}\n\n.tab:hover:not(.disabled):not(.active) {\n  color: var(--emma-black);\n}\n\n.tab.active {\n  color: var(--emma-navy);\n  border-bottom-color: var(--emma-navy);\n  font-weight: var(--fw-bold);\n}\n\n.tab.disabled {\n  color: var(--emma-gray-300);\n  cursor: not-allowed;\n}\n\n/* COSACS action: align Search button with the input field (ignoring hint) */\n.cosacs-action {\n  display: flex;\n  align-items: flex-start;\n}\n\n.cosacs-action .btn-search {\n  width: 100%;\n  height: 56px;\n  min-width: 0;\n}\n\n/* ============================================\n   TAB PANELS\n   ============================================ */\n.tab-panel { display: none; }\n.tab-panel.active { display: block; }\n\n/* Native date input styled to match outlined fields */\n.input-date {\n  font-weight: var(--fw-bold);\n  color: var(--emma-black);\n  cursor: pointer;\n}\n.input-date::-webkit-calendar-picker-indicator {\n  cursor: pointer;\n  opacity: 0.55;\n}\n.input-date:not(:focus):invalid,\n.input-date[value=\"\"] {\n  color: var(--emma-gray-500);\n}\n\n/* ============================================\n   FORM ROW\n   ============================================ */\n.search-form {\n  display: flex;\n  flex-direction: column;\n  gap: var(--space-5);\n}\n\n.form-row {\n  display: grid;\n  gap: var(--space-4);\n  align-items: start;\n  grid-template-columns: 1fr 1fr;\n}\n\n.form-actions {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: var(--space-4);\n  margin-top: var(--space-1);\n}\n\n.form-actions .btn-search {\n  grid-column: 2;\n  width: 100%;\n  min-width: 0;\n}\n\n/* ============================================\n   INPUTS (Material Outlined style)\n   ============================================ */\n.input-group { position: relative; }\n\n.input-field {\n  width: 100%;\n  height: 56px;\n  padding: 0 var(--space-4);\n  border: 1.5px solid var(--emma-gray-300);\n  border-radius: var(--radius-btn);\n  background: var(--emma-white);\n  font-family: var(--font-brand);\n  font-size: 14px;\n  font-weight: var(--fw-bold);\n  color: var(--emma-black);\n  transition: border-color 0.15s ease;\n}\n\n.input-field:focus {\n  outline: none;\n  border-color: var(--emma-navy);\n  border-width: 2px;\n}\n\n.input-field::placeholder {\n  color: var(--emma-gray-500);\n  font-weight: var(--fw-regular);\n  letter-spacing: 0.04em;\n}\n\n.input-label {\n  position: absolute;\n  top: -8px;\n  left: 12px;\n  background: var(--emma-white);\n  padding: 0 var(--space-1);\n  font-size: 11px;\n  font-weight: var(--fw-regular);\n  color: var(--emma-gray-500);\n  letter-spacing: 0.04em;\n}\n\n.input-field:focus ~ .input-label,\n.input-group.focused .input-label {\n  color: var(--emma-navy);\n}\n\n.input-hint {\n  font-size: 11px;\n  color: var(--emma-gray-500);\n  margin-top: var(--space-1);\n  padding-left: var(--space-3);\n  letter-spacing: 0.02em;\n}\n\n/* Select wrapper */\n.select-wrapper { position: relative; }\n\n.select-wrapper::after {\n  content: '';\n  position: absolute;\n  right: 16px;\n  top: 50%;\n  width: 8px;\n  height: 8px;\n  border-right: 2px solid var(--emma-gray-500);\n  border-bottom: 2px solid var(--emma-gray-500);\n  transform: translateY(-75%) rotate(45deg);\n  pointer-events: none;\n}\n\n.select-field {\n  appearance: none;\n  width: 100%;\n  height: 56px;\n  padding: 0 var(--space-10) 0 var(--space-4);\n  border: 1.5px solid var(--emma-gray-300);\n  border-radius: var(--radius-btn);\n  background: var(--emma-white);\n  font-family: var(--font-brand);\n  font-size: 14px;\n  font-weight: var(--fw-bold);\n  color: var(--emma-black);\n  cursor: pointer;\n}\n\n.select-field:focus {\n  outline: none;\n  border-color: var(--emma-navy);\n  border-width: 2px;\n}\n\n/* ============================================\n   BUTTONS\n   ============================================ */\n.btn {\n  height: 48px;\n  border-radius: var(--radius-btn);\n  font-size: 14px;\n  font-weight: var(--fw-bold);\n  letter-spacing: 0.05em;\n  padding: 0 var(--space-6);\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: var(--space-2);\n  transition: opacity 0.15s ease, background 0.15s ease;\n  cursor: pointer;\n}\n\n.btn-primary {\n  background: var(--emma-green);\n  color: var(--emma-navy);\n}\n\n.btn-primary:hover { opacity: 0.9; }\n\n.btn-primary:disabled,\n.btn-primary.disabled {\n  background: var(--btn-primary-disabled-bg);\n  color: var(--btn-primary-disabled-text);\n  cursor: not-allowed;\n}\n\n/* ============================================\n   CARD FOOTER · Pointer to \"+ New customer\"\n   ============================================ */\n.card-footer-row {\n  display: flex;\n  justify-content: flex-start;\n  margin-top: var(--space-5);\n  padding-top: var(--space-4);\n  border-top: 1px solid var(--emma-gray-200);\n}\n\n.card-footer-text {\n  font-size: 13px;\n  color: var(--emma-gray-500);\n  letter-spacing: 0.02em;\n}\n\n.card-footer-link {\n  font-size: 13px;\n  font-weight: var(--fw-medium);\n  color: var(--emma-navy);\n  cursor: pointer;\n  letter-spacing: 0.02em;\n}\n\n.card-footer-link:hover { text-decoration: underline; }\n\n/* ============================================\n   RECENT SEARCHES\n   ============================================ */\n.recent-section { width: 100%; }\n\n.recent-header {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  margin-bottom: var(--space-4);\n  padding: 0 var(--space-2);\n}\n\n.recent-title {\n  font-size: 16px;\n  font-weight: var(--fw-bold);\n  color: var(--emma-black);\n  letter-spacing: 0.03em;\n}\n\n.recent-count {\n  font-size: 12px;\n  color: var(--emma-gray-500);\n}\n\n/* Empty state */\n.recent-empty {\n  background: var(--emma-bg-gray);\n  border: 1px dashed var(--emma-gray-300);\n  border-radius: var(--radius-md);\n  padding: var(--space-10) var(--space-6);\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: var(--space-3);\n  text-align: center;\n}\n\n.recent-empty-icon {\n  width: 48px;\n  height: 48px;\n  border-radius: 50%;\n  background: var(--emma-gray-200);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--emma-gray-500);\n}\n\n.recent-empty-text {\n  font-size: 14px;\n  color: var(--emma-gray-500);\n  max-width: 320px;\n}\n\n.recent-empty-text strong {\n  display: block;\n  color: var(--emma-black);\n  font-weight: var(--fw-bold);\n  margin-bottom: var(--space-1);\n  font-size: 14px;\n}\n\n/* Recent list (with data) */\n.recent-list {\n  background: var(--emma-white);\n  border: 1px solid var(--emma-gray-200);\n  border-radius: var(--radius-md);\n  overflow: hidden;\n}\n\n.recent-item {\n  display: flex;\n  align-items: center;\n  gap: var(--space-4);\n  padding: var(--space-4) var(--space-5);\n  border-bottom: 1px solid var(--emma-gray-200);\n  cursor: pointer;\n  transition: background 0.15s ease;\n}\n\n.recent-item:last-child { border-bottom: none; }\n\n.recent-item:hover { background: var(--emma-bg-blue); }\n\n.recent-info { flex: 1; min-width: 0; }\n\n.recent-name {\n  font-size: 14px;\n  font-weight: var(--fw-bold);\n  color: var(--emma-black);\n  letter-spacing: 0.02em;\n  margin-bottom: 2px;\n  white-space: nowrap;\n  overflow: hidden;\n  text-overflow: ellipsis;\n}\n\n.recent-meta {\n  font-size: 12px;\n  color: var(--emma-gray-500);\n  letter-spacing: 0.03em;\n}\n\n.recent-chip {\n  padding: 4px 12px;\n  border-radius: var(--radius-btn);\n  font-size: 12px;\n  font- ecent-info\">\n                  <div class=\"recent-name\">Pedro Alonso Morales Martinez<\u002Fdiv>\n                  <div class=\"recent-meta\">TRN: 009-856-712 · 15 min ago<\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"recent-chip chip-analysis\">Analysis<\u002Fdiv>\n                <div class=\"recent-chevron\">\n                  <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 18 15 12 9 6\"><\u002Fpolyline><\u002Fsvg>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div class=\"recent-item\">\n                <div class=\"recent-info\">\n                  <div class=\"recent-name\">Marcus Williams Brown<\u002Fdiv>\n                  <div class=\"recent-meta\">COSACS ID: GAFN200392 · 38 min ago<\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"recent-chip chip-observations\">With observations<\u002Fdiv>\n                <div class=\"recent-chevron\">\n                  <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 18 15 12 9 6\"><\u002Fpolyline><\u002Fsvg>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div class=\"recent-item\">\n                <div class=\"recent-info\">\n                  <div class=\"recent-name\">Andrea Campbell<\u002Fdiv>\n                  <div class=\"recent-meta\">Passport: A1234567 · 1 h ago<\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"recent-chip chip-rejected\">Rejected<\u002Fdiv>\n                <div class=\"recent-chevron\">\n                  <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 18 15 12 9 6\"><\u002Fpolyline><\u002Fsvg>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div class=\"recent-item\">\n                <div class=\"recent-info\">\n                  <div class=\"recent-name\">Ricardo Patterson Reid<\u002Fdiv>\n                  <div class=\"recent-meta\">TRN: 412-558-901 · 2 h ago<\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"recent-chip chip-approved\">Approved<\u002Fdiv>\n                <div class=\"recent-chevron\">\n                  <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 18 15 12 9 6\"><\u002Fpolyline><\u002Fsvg>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"footer\">© Unicomer. All rights reserved.<\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<!-- ============================================\n     PROTOTYPE NAV (toggle states)\n     ============================================ -->\n<div class=\"proto-nav\">\n  <a id=\"nav-empty\" class=\"active\" onclick=\"showScreen('empty')\">Empty state<\u002Fa>\n  <a id=\"nav-data\" onclick=\"showScreen('data')\">With recent searches<\u002Fa>\n<\u002Fdiv>\n\n<script>\n/* Document-type → placeholder + hint + validator mapping\n   validate() receives the raw input value; separators are ignored. */\nconst docFormats = {\n  trn:      { placeholder: '000-000-000', hint: 'Format: 9 digits in blocks of 3',\n              validate: v => /^\\d{9}$/.test(v.replace(/[\\s-]/g, '')) },\n  passport: { placeholder: 'A0000000',    hint: 'Format: 1 letter + 7 digits (8 characters)',\n              validate: v => /^[A-Za-z]\\d{7}$/.test(v.replace(/[\\s-]/g, '')) },\n  license:  { placeholder: '0000000-00',  hint: 'Format: 9 digits, blocks of 7 and 2',\n              validate: v => /^\\d{9}$/.test(v.replace(/[\\s-]/g, '')) },\n  nids:     { placeholder: '000000000',   hint: 'Format: 9 digits, no separators',\n              validate: v => /^\\d{9}$/.test(v.replace(/[\\s-]/g, '')) }\n};\n\nfunction onDocTypeChange(idx) {\n  const sel = document.getElementById('doc-type-' + idx);\n  const input = document.getElementById('doc-number-' + idx);\n  const hint = document.getElementById('doc-hint-' + idx);\n  const fmt = docFormats[sel.value] || docFormats.trn;\n  input.value = '';\n  input.placeholder = fmt.placeholder;\n  hint.textContent = fmt.hint;\n  validateDoc(idx);\n}\n\nfunction validateDoc(idx) {\n  const sel = document.getElementById('doc-type-' + idx);\n  const input = document.getElementById('doc-number-' + idx);\n  const btn = document.getElementById('search-btn-' + idx);\n  const fmt = docFormats[sel.value] || docFormats.trn;\n  const valid = fmt.validate(input.value);\n  btn.disabled = !valid;\n  btn.classList.toggle('disabled', !valid);\n}\n\n/* Tab switching */\nfunction switchTab(tabEl) {\n  if (tabEl.classList.contains('disabled')) return;\n  const card = tabEl.closest('.search-card');\n  const target = tabEl.dataset.tab;\n  card.querySelectorAll('.tab').forEach(t => {\n    const on = t === tabEl;\n    t.classList.toggle('active', on);\n    t.setAttribute('aria-selected', on ? 'true' : 'false');\n  });\n  card.querySelectorAll('.tab-panel').forEach(p => {\n    p.classList.toggle('active', p.dataset.panel === target);\n  });\n}\n\n/* Name tab validation */\nfunction isValidDob(v) {\n  if (!v) return false;\n  const d = new Date(v);\n  return !isNaN(d.getTime()) && d <= new Date();\n}\n\nfunction validateName(idx) {\n  const first  = document.getElementById('name-first-'  + idx).value.trim();\n  const last   = document.getElementById('name-last-'   + idx).value.trim();\n  const second = document.getElementById('name-second-' + idx).value.trim();\n  const dob    = document.getElementById('name-dob-'    + idx).value;\n  const btn    = document.getElementById('name-search-btn-' + idx);\n\n  const requiredOk = first.length >= 3 && last.length >= 3;\n  const secondOk   = second.length === 0 || second.length >= 3;\n  const dobOk      = dob === '' || isValidDob(dob);\n\n  const valid = requiredOk && secondOk && dobOk;\n  btn.disabled = !valid;\n  btn.classList.toggle('disabled', !valid);\n}\n\n/* COSACS ID validation: exactly 12 digits */\nfunction validateCosacs(idx) {\n  const input = document.getElementById('cosacs-id-' + idx);\n  const btn   = document.getElementById('cosacs-search-btn-' + idx);\n  const valid = /^[A-Za-z]{4}\\d{6}$/.test(input.value.replace(/\\s/g, ''));\n  btn.disabled = !valid;\n  btn.classList.toggle('disabled', !valid);\n}\n\n/* Cap birth-date pickers to today */\ndocument.querySelectorAll('.input-date').forEach(d => {\n  d.max = new Date().toISOString().split('T')[0];\n});\n\n/* Sidebar toggle */\ndocument.querySelectorAll('.sidebar-toggle').forEach(btn => {\n  btn.addEventListener('click', () => {\n    btn.closest('.sidebar').classList.toggle('open');\n  });\n});\n\n/* Screen switching */\nfunction showScreen(name) {\n  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));\n  document.getElementById('screen-' + name).classList.add('active');\n  document.querySelectorAll('.proto-nav a').forEach(a => a.classList.remove('active'));\n  document.getElementById('nav-' + name).classList.add('active');\n}\n<\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
